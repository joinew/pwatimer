<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="리니지타이머">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>리니지 보스타이머</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">

    <!-- 헤더 -->
    <div class="header">
      <div class="header-title">⚔️ 리니지 보스타이머</div>
      <div id="current-time-display" class="header-time"></div>
    </div>

    <!-- 스크롤 영역 -->
    <div class="scroll-area">

      <!-- 보스 -->
      <div class="section-block">
        <div class="section-label">⚔️ 다음 보스</div>
        <div id="boss-list" class="item-list"></div>
      </div>

      <!-- 컨텐츠 -->
      <div class="section-block">
        <div class="section-label">🚩 다음 컨텐츠</div>
        <div id="hunting-list" class="item-list"></div>
      </div>

      <div class="divider"></div>

      <!-- 자동사냥 -->
      <div class="section-block">
        <div class="section-label">🏹 자동사냥</div>

        <div id="auto-idle">
          <div class="inner-card">
            <div class="auto-desc">종료 목표 시각을 입력하세요</div>
            <div class="auto-row">
              <label class="auto-label">종료 시각</label>
              <div class="auto-time-inputs">
                <div class="auto-time-group">
                  <input type="number" id="input-end-hour" min="0" max="23" value="22" class="auto-input">
                  <span class="auto-unit">시</span>
                </div>
                <div class="auto-time-group">
                  <input type="number" id="input-end-min" min="0" max="59" value="0" class="auto-input">
                  <span class="auto-unit">분</span>
                </div>
              </div>
            </div>
            <div class="auto-row">
              <label class="auto-label">알람 시점</label>
              <div class="auto-time-inputs">
                <div class="auto-time-group">
                  <input type="number" id="input-warn" min="1" max="60" value="10" class="auto-input auto-input-sm">
                  <span class="auto-unit">분 전</span>
                </div>
              </div>
            </div>
            <button id="btn-start" class="btn-primary">🏹 사냥 시작</button>
          </div>
        </div>

        <div id="auto-running" style="display:none">
          <div class="inner-card running-card">
            <div class="running-badge">🏹 사냥 중</div>
            <div class="info-row">
              <span class="info-label">시작</span>
              <span id="disp-start" class="info-value"></span>
              <span class="info-label" style="margin-left:12px">종료</span>
              <span id="disp-end" class="info-value accent"></span>
            </div>
            <div class="gauge-wrap">
              <div class="gauge-bg">
                <div id="auto-gauge-fill" class="gauge-fill"></div>
              </div>
              <div class="gauge-labels">
                <span id="disp-gauge-pct" class="gauge-pct">0%</span>
                <span id="disp-gauge-remain" class="gauge-remain"></span>
              </div>
            </div>
            <div class="countdown-box">
              <div class="countdown-label">종료까지</div>
              <div id="disp-remain" class="countdown"></div>
            </div>
            <div id="auto-warn-banner" class="warn-banner" style="display:none">
              ⚠️ <span id="auto-warn-text"></span>
            </div>
            <button id="btn-stop" class="btn-secondary">⏹ 사냥 종료</button>
          </div>
        </div>

        <div id="auto-done" style="display:none">
          <div class="inner-card done-card">
            <div class="done-icon">✅</div>
            <div class="done-title">사냥 종료!</div>
            <div id="disp-total" class="done-sub"></div>
            <button id="btn-reset" class="btn-primary" style="margin-top:16px">🔄 다시 설정</button>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- 숙련도 물약 -->
      <div class="section-block">
        <div class="section-label">💊 숙련도 물약</div>
        <div class="inner-card" id="buff-mastery">
          <div class="buff-header">
            <div class="buff-info">
              <span class="buff-name">숙련도 물약</span>
              <span class="buff-duration">1시간</span>
            </div>
            <button class="btn-buff" id="btn-mastery">사용</button>
          </div>
          <div id="mastery-active" style="display:none">
            <div class="gauge-bg" style="margin-top:10px">
              <div class="gauge-fill buff-fill" id="mastery-gauge"></div>
            </div>
            <div class="gauge-labels">
              <span id="mastery-remain" class="gauge-remain" style="color:#a6e3a1"></span>
              <span id="mastery-pct" class="gauge-pct"></span>
            </div>
            <button class="btn-secondary" id="btn-mastery-cancel" style="margin-top:8px">취소</button>
          </div>
        </div>
      </div>

      <!-- 개방 중 컨텐츠 (해당 시간에만) -->
      <div id="open-section" style="display:none">
        <div class="divider"></div>
        <div class="section-block">
          <div class="section-label">🕐 개방 중</div>
          <div id="open-gauges"></div>
        </div>
      </div>

      <div style="height:20px"></div>
    </div><!-- /scroll-area -->

    <!-- 하단 알람 버튼 -->
    <div class="bottom-bar">
      <button id="alarm-btn" class="alarm-btn on">🔔 알람 켜짐</button>
    </div>

  </div>

  <div id="flash-overlay"></div>
  <script src="app.js"></script>
</body>
</html>
