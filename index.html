<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="리니지타이머">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>리니지 보스타이머</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">

    <!-- 상단 헤더 -->
    <div class="header">
      <div class="header-title">⚔️ 리니지 보스타이머</div>
      <div id="current-time-display" class="header-time"></div>
    </div>

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab active" data-tab="boss">⚔️ 보스</button>
      <button class="tab" data-tab="hunting">🚩 컨텐츠</button>
      <button class="tab" data-tab="auto">🏹 자동사냥</button>
    </div>

    <!-- 보스 탭 -->
    <div id="tab-boss" class="tab-content active">
      <div id="boss-list" class="item-list"></div>
    </div>

    <!-- 컨텐츠 탭 -->
    <div id="tab-hunting" class="tab-content">
      <div id="hunting-list" class="item-list"></div>
    </div>

    <!-- 자동사냥 탭 -->
    <div id="tab-auto" class="tab-content">

      <!-- 상태: 대기 중 -->
      <div id="auto-idle">
        <div class="auto-card">
          <div class="auto-card-title">⏱️ 사냥 시간 설정</div>

          <div class="auto-row">
            <label class="auto-label">사냥 시간</label>
            <div class="auto-time-inputs">
              <div class="auto-time-group">
                <input type="number" id="input-hour" min="0" max="23" value="0" class="auto-input">
                <span class="auto-unit">시간</span>
              </div>
              <div class="auto-time-group">
                <input type="number" id="input-min" min="0" max="59" value="30" class="auto-input">
                <span class="auto-unit">분</span>
              </div>
            </div>
          </div>

          <div class="auto-row">
            <label class="auto-label">종료 알람</label>
            <div class="auto-time-inputs">
              <div class="auto-time-group">
                <input type="number" id="input-warn" min="1" max="60" value="10" class="auto-input auto-input-sm">
                <span class="auto-unit">분 전</span>
              </div>
            </div>
          </div>

          <button id="btn-start" class="auto-btn-start">🏹 사냥 시작</button>
        </div>
      </div>

      <!-- 상태: 사냥 중 -->
      <div id="auto-running" style="display:none">
        <div class="auto-card running-card">
          <div class="auto-status-badge">🏹 사냥 중</div>

          <div class="auto-info-row">
            <span class="auto-info-label">시작 시각</span>
            <span id="disp-start" class="auto-info-value"></span>
          </div>
          <div class="auto-info-row">
            <span class="auto-info-label">종료 예정</span>
            <span id="disp-end" class="auto-info-value accent"></span>
          </div>

          <div class="auto-countdown-box">
            <div class="auto-countdown-label">종료까지</div>
            <div id="disp-remain" class="auto-countdown"></div>
          </div>

          <!-- 경고 배너 (평소엔 숨김) -->
          <div id="auto-warn-banner" class="auto-warn-banner" style="display:none">
            ⚠️ <span id="auto-warn-text"></span>
          </div>

          <button id="btn-stop" class="auto-btn-stop">⏹ 사냥 종료</button>
        </div>
      </div>

      <!-- 상태: 사냥 완료 -->
      <div id="auto-done" style="display:none">
        <div class="auto-card done-card">
          <div class="auto-done-icon">✅</div>
          <div class="auto-done-title">사냥 종료!</div>
          <div id="disp-total" class="auto-done-sub"></div>
          <button id="btn-reset" class="auto-btn-start" style="margin-top:20px">🔄 다시 설정</button>
        </div>
      </div>

    </div><!-- /tab-auto -->

    <!-- 알람 토글 버튼 -->
    <div class="bottom-bar">
      <button id="alarm-btn" class="alarm-btn on">🔔 알람 켜짐</button>
    </div>

  </div>

  <!-- 깜빡임 오버레이 -->
  <div id="flash-overlay"></div>

  <script src="app.js"></script>
</body>
</html>
